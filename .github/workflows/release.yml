name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release (for example, v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset_name: lv2-smoketest-linux-x86_64.tar.gz
          - os: macos-latest
            asset_name: lv2-smoketest-macos.tar.gz
          - os: windows-latest
            asset_name: lv2-smoketest-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config liblilv-dev patchelf

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          command -v pkg-config >/dev/null 2>&1 || brew install pkgconf
          brew list lilv >/dev/null 2>&1 || brew install lilv

      - name: Setup MSYS2 (Windows dependencies)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-lilv

      - name: Setup Rust toolchain (non-Windows)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cargo build --release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo build --release

      - name: Bundle runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          rm -rf package
          mkdir -p package/lib
          cp target/release/lv2-smoketest package/

          copy_first_available() {
            local lib_path=""
            for candidate in "$@"; do
              lib_path="$(ldconfig -p | awk -v name="$candidate" '$1 == name { print $NF; exit }')"
              if [ -n "$lib_path" ]; then
                cp -L "$lib_path" package/lib/
                return 0
              fi
            done
            echo "Missing runtime library candidates: $*"
            exit 1
          }

          copy_first_available liblilv-0.so.0
          copy_first_available libsord-0.so.0
          copy_first_available libserd-0.so.0
          copy_first_available libsratom-0.so.0
          copy_first_available libzix-0.so.1 libzix-0.so.0

          patchelf --set-rpath '$ORIGIN/lib' package/lv2-smoketest
          tar -czf "${{ matrix.asset_name }}" -C package .

      - name: Bundle runtime libs (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          rm -rf package
          mkdir -p package/lib
          cp target/release/lv2-smoketest package/

          BREW_PREFIX="$(brew --prefix)"
          libs=(
            liblilv-0.dylib
            libsord-0.dylib
            libserd-0.dylib
            libsratom-0.dylib
            libzix-0.dylib
          )

          for lib in "${libs[@]}"; do
            src="$BREW_PREFIX/lib/$lib"
            if [ ! -f "$src" ]; then
              echo "Missing runtime library: $src"
              exit 1
            fi
            cp "$src" package/lib/
            install_name_tool -change "$src" "@executable_path/lib/$lib" package/lv2-smoketest
          done

          for dylib in package/lib/*.dylib; do
            base="$(basename "$dylib")"
            install_name_tool -id "@executable_path/lib/$base" "$dylib"
            for dep in "${libs[@]}"; do
              install_name_tool -change "$BREW_PREFIX/lib/$dep" "@executable_path/lib/$dep" "$dylib" || true
            done
          done

          tar -czf "${{ matrix.asset_name }}" -C package .

      - name: Bundle runtime libs (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          rm -rf package
          mkdir -p package
          cp target/release/lv2-smoketest.exe package/

          for dll in \
            liblilv-0-0.dll \
            libsord-0-0.dll \
            libserd-0-0.dll \
            libsratom-0-0.dll \
            libzix-0-0.dll \
            libgcc_s_seh-1.dll \
            libstdc++-6.dll \
            libwinpthread-1.dll; do
            src="/mingw64/bin/$dll"
            if [ ! -f "$src" ]; then
              echo "Missing runtime DLL: $src"
              exit 1
            fi
            cp "$src" package/
          done

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Compress-Archive -Path package\* -DestinationPath ${{ matrix.asset_name }} -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          generate_release_notes: true
